    -   MC name: Item
        Rust Equivalent: MCItem
        special: true
        special read: |
            let item_id = MCShort::read(stream);
            
            //the server will only send the count and uses if the id is not -1 (-1 means empty slot)
            let count = if item_id.value != -1 {
                MCByte::read(stream)
            } else {
                MCByte {
                    value: 0,
                }
            };

            let uses = if item_id.value != -1 {
                MCShort::read(stream)
            } else {
                MCShort {
                    value: 0,
                }
            };
        special write: |
            let _ = 1; //PLACEHOLDER
        Data:
            -   Item ID: MCShort
            -   Count: MCByte
            -   Uses: MCShort