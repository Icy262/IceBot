Movements:
    -   name: Jump
        packet conversion: |
            let mut packets: Vec<Packets> = Vec::new();

            PLAYER.with_borrow_mut(|player| {
                //accelerate the player 0.42 b/t upward
                player.vy += 0.42;
            });

            //process motion
            update_position();

            PLAYER.with_borrow(|player| {
                packets.push(
                    Packets::PlayerPositionandLook(
                        PlayerPositionandLook {
                            x: MCDouble { value:  player.x },
                            y: MCDouble { value: player.y },
                            z: MCDouble { value: player.z },
                            stance: MCDouble { value: player.y as f64 + 1.62 },
                            yaw: MCFloat { value: player.yaw as f32 },
                            pitch: MCFloat { value: player.pitch as f32 },
                            on_ground: MCBool { value: player.on_ground },
                        }
                    )
                )
            });

            return packets;

    -   name: Walk
        packet conversion: |
            //TODO: implement stance properly
            let mut packets: Vec<Packets> = Vec::new();

            PLAYER.with_borrow_mut(|player| {
                //accelerate the player a total of 0.02 blocks/tick on the x/z axes
                player.vx += -0.02 * player.yaw.to_radians().sin();
                player.vz += 0.02 * player.yaw.to_radians().cos();
            });

            //process motion
            update_position();

            PLAYER.with_borrow(|player| {
                packets.push(
                    Packets::PlayerPositionandLook(
                        PlayerPositionandLook {
                            x: MCDouble { value:  player.x },
                            y: MCDouble { value: player.y },
                            z: MCDouble { value: player.z },
                            stance: MCDouble { value: player.y as f64 + 1.62 },
                            yaw: MCFloat { value: player.yaw as f32 },
                            pitch: MCFloat { value: player.pitch as f32 },
                            on_ground: MCBool { value: player.on_ground },
                        }
                    )
                )
            });

            return packets;

