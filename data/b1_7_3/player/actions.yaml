Actions:
    -   name: Join
        packet conversion: |
            let mut packets: Vec<Packets> = Vec::new();
            let username = MCString16 {
                length: MCShort { value: action.username.len() as i16 },
                text: action.username,
            };
            packets.push(
                Packets::Handshake(
                    Handshake {
                        username: username.clone(),
                    }
                )
            );
            packets.push(
                Packets::LoginRequest(
                    LoginRequest {
                        protocol_version: MCInt { value: 14 },
                        username: username,
                        map_seed: MCLong { value: 0 as i64 },
                        dimension: MCByte { value: 0 as i8 },
                    }
                )
            );
            return packets;

    -   name: DoNothing
        packet conversion: |
            let mut packets: Vec<Packets> = Vec::new();
            return packets;

    -   name: BreakBlock
        packet conversion: |
            //TODO: implement face
            //TODO: implement calculating the correct number of ticks to break a block, and track ticks since started breaking
            //status 0 means start, 2 means finished
            let mut packets: Vec<Packets> = Vec::new();

            packets.push(Packets::PlayerDigging (
                PlayerDigging {
                    status: MCByte { value: 0 },
                    x: MCInt { value: action.position.x },
                    y: MCByte { value: action.position.y as i8 },
                    z: MCInt { value: action.position.z },
                    face: MCByte { value: 0 },
                }
            ));
            
            packets.push(Packets::PlayerDigging (
                PlayerDigging {
                    status: MCByte { value: 2 },
                    x: MCInt { value: action.position.x },
                    y: MCByte { value: action.position.y as i8 },
                    z: MCInt { value: action.position.z },
                    face: MCByte { value: 0 },
                }
            ));

            return packets;

    -   name: PlaceBlock
        packet conversion: |
            //TODO: implement
            let mut packets: Vec<Packets> = Vec::new();
            return packets;