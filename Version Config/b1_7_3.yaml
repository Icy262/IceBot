    -   MC name: double
        Rust Equivalent: MCDouble
        special: true
        special read: "stream.read_f64::<BigEndian>().expect(\"Should be able to read f64 from stream\")"
        special write: "stream.write_f64::<BigEndian>(data.{variable_name}).expect(\"Should be able to write f64 to stream\")"
        Data:
            -   value: f64

    -   MC name: string8
        Rust Equivalent: MCString8
        special: true
        special read: "let length = stream.read_i16::<BigEndian>().expect(\"Should be able to read length (i16) from stream\");\nlet mut buffer = vec![0u8; length as usize];\nstream.read_exact(&mut buffer).expect(\"Should be able to read length u8 from stream\")nlet text = String::from_utf8(buffer).expect(\"Should be able to convert array of utf8 bytes to string\");\n"
        special write: "stream.write_i16::<BigEndian>(data.length as i16).expect(\"Should be able to write length i16 to stream\");\nstream.write_all(data.text.as_bytes()).expect(\"Should be able to write all bytes of utf8 to stream\");\n"
        Data:
            -   length: i16
            -   text: String

    -   MC name: string16
        Rust Equivalent: MCString16
        special: true
        special read: "let length = stream.read_i16::<BigEndian>().expect(\"Should be able to read length (i16) from stream\")\nlet mut buffer = vec![0u8; length as usize];\nstream.read_exact(&mut buffer).expect(\"Should be able to read exact number of bytes\");\nlet text = String::from_utf16(&buffer.chunks_exact(2).map(|character_bytes| u16::from_be_bytes([character_bytes[0], character_bytes[1]])).collect::<Vec<u16>>()).expect(\"Should be valid UCS2 data\");\n"
        special write: "let encoded = vec![u16; data.length as usize].as_slice();\nlet length = ucs2::encode(&data.text, &mut encoded).unwrap();\nstream.write_i16::<BigEndian>(length as i16).unwrap();\nstream.write_all(&encoded).unwrap();\n"
        Data:
            -   length: i16
            -   text: String

    -   MC name: bool
        Rust Equivalent: MCBool
        special: true
        special read: "stream.read_u8().expect(\"Should be able to read u8 from stream\") == 1"
        special write: "stream.write_u8(data.{variable_name} as u8).expect(\"Should be able to write bool (u8) to stream\")"
        Data:
            -   value: bool

