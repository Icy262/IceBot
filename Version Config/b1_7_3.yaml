    -   MC name: float
        Rust Equivalent: MCFloat
        special: true
        special read: "stream.read_f32::<BigEndian>().expect(\"Should be able to read f32 from stream\")"
        special write: "stream.write_f32::<BigEndian>(data.{variable_name}).expect(\"Should be able to write f32 to stream\")"
