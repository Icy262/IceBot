Types:
    -   MC name: byte
        Rust Equivalent: MCByte
        special: true
        special read: "stream.read_i8().expect(\"Should be able to read i8 from stream\")"
        special write: "stream.write_i8(data.{variable_name}).expect(\"Should be able to write i8 to stream\")"
        Data:
            -   value: i8

    -   MC name: ubyte
        Rust Equipment: MCUByte
        special: true
        special read: "stream.read_u8().expect(\"Should be able to read u8 from stream\")"
        special write: "stream.write_u8(data.{variable_name}).expect(\"Should be able to write u8 to stream\")"
        Data:
            -   value: u8

    -   MC name: short
        Rust Equivalent: MCShort
        special: true
        special read: "stream.read_i16::<BigEndian>().expect(\"Should be able to read i16 from stream\")"
        special write: "stream.write_i16::<BigEndian>(data.{variable_name}).expect(\"Should be able to write i16 to stream\")"
        Data:
            -   value: i16

    -   MC name: int
