        special: true
        special read: "stream.read_i32::<BigEndian>().expect(\"Should be able to read i32 from stream\")"
        special write: "stream.write_i32::<BigEndian>(data.{variable_name}).expect(\"Should be able to write i32 to stream\")"
        Data:
            -   value: i32

    -   MC name: long
        Rust Equivalent: MCLong
        special: true
        special read: "stream.read_i64::<BigEndian>().expect(\"Should be able to read i64 from stream\")"
        special write: "stream.write_i64::<BigEndian>(data.{variable_name}).expect(\"Should be able to write i64 to stream\")"
        Data:
